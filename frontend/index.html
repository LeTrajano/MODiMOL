<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>MODiMOL</title>

    <link rel="stylesheet" href="style.css">
</head> 


<body>
<header class="topbar">

    <div class="header-left">

        <h1>MODiMOL</h1>

        <p>
            Plataforma de Modelagem para Inovação Molecular
        </p>

    </div>

</header>

<main class="layout">


    <!-- ESQUERDA -->


    <section class="editor-panel">

        <h2>Editor Molecular</h2>

        <iframe

            id="ketcher-frame"

            src="standalone/"

            width="100%"

            height="520">

        </iframe>

        <div class="smiles-box">

            <label>SMILES</label>

            <input

                id="smiles"

                placeholder="Ex: CCO">

        </div>

        <div class="buttons">

            <button onclick="obterSmilesDoDesenho()">

                Obter SMILES

            </button>

            <button onclick="normalizar()">

                Normalizar

            </button>

            <button onclick="buscarSimilar()">

                Buscar Similares

            </button>

        </div>

    </section>



    <!-- DIREITA -->


<aside class="info-panel">

    <div class="result-card">

        <h2>Informações Moleculares</h2>

        <div class="info-grid">

            <div class="info-item">
                <span>Nome IUPAC</span>
                <strong id="iupac-name">-</strong>
            </div>

            <div class="info-item">
                <span>Fórmula</span>
                <strong id="formula">-</strong>
            </div>

            <div class="info-item">
                <span>Massa Molecular</span>
                <strong id="molwt">-</strong>
            </div>

            <div class="info-item">
                <span>LogP</span>
                <strong id="logp">-</strong>
            </div>

            <div class="info-item">
                <span>TPSA</span>
                <strong id="tpsa">-</strong>
            </div>
            <div class="info-item">
    
        <span>HBD</span>
         <strong id="hbd">-</strong>
        </div>

        <div class="info-item">
         <span>HBA</span>
         <strong id="hba">-</strong>
        </div>

        <div class="info-item">
         <span>Ligações Rotacionáveis</span>
         <strong id="rotbonds">-</strong>
        </div>

        <div class="info-item">
         <span>Anéis Aromáticos</span>
         <strong id="aromaticrings">-</strong>
        </div>

        </div>

    </div>

    <div class="result-card">

        <h2>Estrutura 2D</h2>

        <img id="mol-img" class="mol-image">

    </div>

    <div class="result-card">

        <h2>Identificadores</h2>

        <div class="identifier-box">

            <label>InChI</label>
            <textarea id="inchi-box" readonly></textarea>

            <label>InChIKey</label>
            <input id="inchikey-box" readonly>

        </div>

    </div>

</aside>

</main>


 <div class="table-wrapper">
  <table
    id="similar-table"
    style="display:none;">
    <thead>

        <tr>

            <th>Similaridade</th>

            <th>SMILES</th>

            <th>InChIKey</th>

        </tr>
    </thead>
    <tbody id="similar-body"></tbody>

  </table>
 </div>


<script src="app.js"></script>

</body>
</html>
